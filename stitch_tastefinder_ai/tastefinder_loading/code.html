<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<title>TasteFinder - Generating AI Plan</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Custom Loader Animation */
        .loader-ring {
            display: inline-block;
            position: relative;
            width: 80px;
            height: 80px;
        }
        .loader-ring div {
            box-sizing: border-box;
            display: block;
            position: absolute;
            width: 64px;
            height: 64px;
            margin: 8px;
            border: 6px solid;
            border-radius: 50%;
            animation: loader-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            border-color: #b7122a transparent transparent transparent; /* Primary color */
        }
        .loader-ring div:nth-child(1) {
            animation-delay: -0.45s;
        }
        .loader-ring div:nth-child(2) {
            animation-delay: -0.3s;
        }
        .loader-ring div:nth-child(3) {
            animation-delay: -0.15s;
        }
        @keyframes loader-ring {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Subtle Shimmer for Skeletons */
        .shimmer-bg {
            background: linear-gradient(90deg, #e9edff 25%, #f1f3ff 50%, #e9edff 75%);
            background-size: 400% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        .dark .shimmer-bg {
            background: linear-gradient(90deg, #dce2f7 25%, #e1e8fd 50%, #dce2f7 75%);
            background-size: 400% 100%;
        }
        @keyframes shimmer {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopNavBar (Desktop) -->
<header class="hidden md:flex fixed top-0 left-0 w-full z-50 flex-col items-center px-margin-desktop py-base bg-surface shadow-sm">
<div class="w-full max-w-[container-max-width] flex justify-between items-center h-16">
<div class="flex items-center">
<span class="text-headline-md font-headline-md font-bold text-primary tracking-tight">TasteFinder</span>
</div>
<nav class="flex gap-8">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors font-label-md text-label-md scale-95 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]">explore</span>
                    Discover
                </a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors font-label-md text-label-md scale-95 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]">bookmark</span>
                    Saved
                </a>
<a class="flex flex-col items-center justify-center text-primary border-b-2 border-primary font-label-md text-label-md scale-95 active:scale-90 transition-transform pb-1" href="#">
<span class="material-symbols-outlined filled mb-1 text-[24px]">auto_awesome</span>
                    AI Plan
                </a>
</nav>
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:text-primary transition-colors p-2 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors p-2 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined" data-icon="person">person</span>
</button>
</div>
</div>
</header>
<!-- Main Content Canvas (Background Skeletons) -->
<main class="flex-grow w-full max-w-[container-max-width] mx-auto px-margin-mobile md:px-margin-desktop pt-24 md:pt-32 pb-32">
<!-- Skeleton Grid Layout -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-gutter">
<!-- Skeleton Card 1 -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.02)] border border-surface-variant overflow-hidden flex flex-col h-[340px]">
<div class="h-48 w-full shimmer-bg"></div>
<div class="p-4 flex flex-col gap-3 flex-grow justify-center">
<div class="h-6 w-3/4 rounded-md shimmer-bg"></div>
<div class="h-4 w-1/2 rounded-md shimmer-bg"></div>
<div class="mt-auto flex gap-2">
<div class="h-8 w-16 rounded-full shimmer-bg"></div>
<div class="h-8 w-20 rounded-full shimmer-bg"></div>
</div>
</div>
</div>
<!-- Skeleton Card 2 -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.02)] border border-surface-variant overflow-hidden flex flex-col h-[340px] hidden md:flex">
<div class="h-48 w-full shimmer-bg"></div>
<div class="p-4 flex flex-col gap-3 flex-grow justify-center">
<div class="h-6 w-2/3 rounded-md shimmer-bg"></div>
<div class="h-4 w-1/2 rounded-md shimmer-bg"></div>
<div class="mt-auto flex gap-2">
<div class="h-8 w-24 rounded-full shimmer-bg"></div>
<div class="h-8 w-16 rounded-full shimmer-bg"></div>
</div>
</div>
</div>
<!-- Skeleton Card 3 -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.02)] border border-surface-variant overflow-hidden flex flex-col h-[340px] hidden lg:flex">
<div class="h-48 w-full shimmer-bg"></div>
<div class="p-4 flex flex-col gap-3 flex-grow justify-center">
<div class="h-6 w-4/5 rounded-md shimmer-bg"></div>
<div class="h-4 w-2/5 rounded-md shimmer-bg"></div>
<div class="mt-auto flex gap-2">
<div class="h-8 w-20 rounded-full shimmer-bg"></div>
<div class="h-8 w-20 rounded-full shimmer-bg"></div>
</div>
</div>
</div>
</div>
</main>
<!-- Loading Overlay -->
<div class="fixed inset-0 z-40 bg-surface/60 backdrop-blur-md flex items-center justify-center pt-16 md:pt-24 pb-20 md:pb-0 px-margin-mobile transition-opacity duration-500">
<!-- Loading Modal/Card -->

<div></div><div></div><div></div><div></div>
</div>
<!-- Main Status Text -->

<div class="w-full flex flex-col gap-5">

<div class="flex items-center gap-4 opacity-70">
<div class="flex-shrink-0 w-8 h-8 rounded-full bg-surface-container flex items-center justify-center text-primary">

</div>

<!-- Step 2: Active -->

</div>
<span class="font-label-md text-label-md text-on-surface font-semibold">Asking AI</span>
</div>
<!-- Step 3: Pending -->
<div class="flex items-center gap-4 opacity-40">
<div class="flex-shrink-0 w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center text-outline">

</div>

</div>
</div>
</div>
