<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta name="description" content="Personalized restaurant recommendations from real Zomato data — filtered by you, ranked by AI." />
    <title>TasteFinder - Zomato AI Advisor</title>
    
    <!-- Google Fonts: DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
    
    <!-- Material Symbols Outlined -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Tailwind Configuration -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-error": "#ffffff",
                        "on-primary-container": "#fffbff",
                        "inverse-primary": "#ffb3b1",
                        "on-background": "#141b2b",
                        "on-secondary": "#ffffff",
                        "tertiary": "#5e39e0",
                        "secondary": "#7c5800",
                        "on-secondary-container": "#6b4b00",
                        "outline": "#8f6f6e",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#ffba20",
                        "surface-container": "#e9edff",
                        "on-secondary-fixed": "#271900",
                        "primary": "#b7122a",
                        "primary-fixed": "#ffdad8",
                        "primary-container": "#db313f",
                        "background": "#f9f9ff",
                        "on-tertiary-fixed-variant": "#4816cb",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed": "#410007",
                        "on-surface-variant": "#5b403f",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#cabeff",
                        "surface-container-highest": "#dce2f7",
                        "secondary-container": "#feb700",
                        "outline-variant": "#e4bebc",
                        "surface-tint": "#bb162c",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed-variant": "#5e4200",
                        "primary-fixed-dim": "#ffb3b1",
                        "surface-variant": "#dce2f7",
                        "secondary-fixed": "#ffdea8",
                        "on-tertiary-fixed": "#1c0062",
                        "on-primary-fixed-variant": "#92001c",
                        "surface-container-high": "#e1e8fd",
                        "tertiary-container": "#7757fa",
                        "on-tertiary-container": "#fffbff",
                        "surface": "#f9f9ff",
                        "surface-container-low": "#f1f3ff",
                        "inverse-on-surface": "#edf0ff",
                        "tertiary-fixed": "#e6deff",
                        "surface-bright": "#f9f9ff",
                        "on-surface": "#141b2b",
                        "inverse-surface": "#293040",
                        "on-primary": "#ffffff",
                        "surface-dim": "#d3daef",
                        "on-error-container": "#93000a"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "margin-mobile": "16px",
                        "gutter": "24px",
                        "margin-desktop": "40px",
                        "base": "8px",
                        "container-max-width": "1280px"
                    },
                    fontFamily: {
                        "headline-lg-mobile": ["DM Sans"],
                        "headline-lg": ["DM Sans"],
                        "headline-sm": ["DM Sans"],
                        "display-lg": ["DM Sans"],
                        "label-sm": ["DM Sans"],
                        "body-lg": ["DM Sans"],
                        "label-md": ["DM Sans"],
                        "body-md": ["DM Sans"],
                        "headline-md": ["DM Sans"]
                    },
                    fontSize: {
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }]
                    }
                }
            }
        };
    </script>
    
    <!-- React 18 & ReactDOM 18 CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for in-browser compiling of JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Custom styles containing loaders, shimmers, and special transitions -->
    <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen selection:bg-primary-container selection:text-on-primary-container">
    
    <!-- React Root Entry -->
    <div id="root"></div>

    <!-- React App Script -->
    <script type="text/babel" src="app.js"></script>
</body>
</html>
